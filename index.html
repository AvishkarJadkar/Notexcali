<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notexcali — Notes & Illustrations</title>
    <meta name="description" content="A premium note-taking app with drawing capabilities. Organize ideas with blocks, sketches, and projects.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Libraries (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/roughjs@4.5.2/dist/rough.umd.js"></script>

    <!-- Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <!-- PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i data-lucide="zap" size="14"></i>
                    </div>
                    <span>Notexcali</span>
                </div>
            </div>

            <div class="sidebar-content" id="sidebar-content">
                <div class="nav-group">
                    <div class="nav-label"><span>Workspace</span></div>
                    <nav id="page-list">
                        <!-- Pages injected by JS -->
                    </nav>
                </div>

                <div class="nav-group">
                    <div class="nav-label">
                        <span>Projects</span>
                        <button id="btn-new-project" class="icon-btn small" title="New Project">
                            <i data-lucide="folder-plus" size="14"></i>
                        </button>
                    </div>
                    <nav id="project-list">
                        <!-- Projects injected by JS -->
                    </nav>
                </div>

                <div class="nav-group">
                    <div class="nav-label"><span>Personal</span></div>
                    <div class="nav-item" id="btn-new-page">
                        <i data-lucide="plus" size="16"></i>
                        <span>New Page</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="nav-item" id="btn-export-data">
                    <i data-lucide="download" size="16"></i>
                    <span>Export Data</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main">
            <header class="header" id="main-header">
                <div class="header-left">
                    <button id="toggle-sidebar" class="icon-btn" title="Toggle sidebar (Ctrl+\)">
                        <i data-lucide="panel-left" size="18"></i>
                    </button>
                    <span id="current-page-crumbs" class="header-breadcrumb">Workspace</span>
                </div>
                <div class="header-right">
                    <span id="save-status" class="save-status">Saved</span>
                    <button id="btn-download-pdf" class="btn btn-secondary" title="Download as PDF">
                        <i data-lucide="file-down" size="14"></i>
                        <span>PDF</span>
                    </button>
                    <button id="btn-theme-toggle" class="icon-btn" title="Toggle theme">
                        <i data-lucide="moon" size="16"></i>
                    </button>
                </div>
            </header>

            <div class="content-wrapper" id="content-wrapper">
                <div class="editor-container" id="editor-wrapper">
                    <div class="page-header" id="page-header">
                        <button class="page-emoji-btn" id="page-emoji" title="Change emoji">🚀</button>
                        <div contenteditable="true" id="page-title" class="page-title" spellcheck="false">Getting Started with Notexcali</div>
                    </div>

                    <div id="editor">
                        <!-- Editor blocks rendered by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- App Entry -->
    <script type="module" src="main.js"></script>
    <script>
        // Initialize Lucide icons for the shell
        if (window.lucide) lucide.createIcons();

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('📱 Service Worker registered'))
                .catch(err => console.warn('Service Worker registration failed:', err));
        }
    </script>
</body>
</html>
