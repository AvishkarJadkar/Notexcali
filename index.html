<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notexcali — Notes & Illustrations</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Libraries (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/roughjs@4.5.2/dist/rough.umd.js"></script>
    
    <!-- Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i data-lucide="zap" size="18"></i>
                    </div>
                    <span>Notexcali</span>
                </div>
            </div>
            
            <div class="sidebar-content">
                <div class="nav-group">
                    <div class="nav-label">Workspace</div>
                    <nav id="page-list">
                        <!-- Pages will be injected here -->
                        <div class="nav-item active">
                            <i data-lucide="file-text" size="16"></i>
                            <span>Getting Started</span>
                        </div>
                    </nav>
                </div>
                
                <div class="nav-group">
                    <div class="nav-label">Personal</div>
                    <div class="nav-item" id="btn-new-page">
                        <i data-lucide="plus" size="16"></i>
                        <span>New Page</span>
                    </div>
                    <div class="nav-item">
                        <i data-lucide="archive" size="16"></i>
                        <span>Archive</span>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-footer" style="padding: 20px; border-top: 1px solid var(--border);">
                <div class="nav-item">
                    <i data-lucide="settings" size="16"></i>
                    <span>Settings</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main">
            <header class="header">
                <div class="header-left">
                    <button id="toggle-sidebar" class="icon-btn">
                        <i data-lucide="panel-left" size="18"></i>
                    </button>
                    <span id="current-page-crumbs" style="margin-left: 12px; color: var(--text-muted); font-size: 0.9rem;">Workspace / Getting Started</span>
                </div>
                <div class="header-right" style="display: flex; gap: 12px; align-items: center;">
                    <span id="save-status" style="font-size: 0.8rem; color: var(--text-muted);">Saved</span>
                    <i data-lucide="more-horizontal" size="18" style="cursor: pointer;"></i>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="editor-container animate-fade-in">
                    <div id="page-header" style="margin-bottom: 40px;">
                        <span id="page-emoji" style="font-size: 4rem; display: block; margin-bottom: 10px; cursor: pointer;">🚀</span>
                        <h1 contenteditable="true" id="page-title" spellcheck="false">Getting Started with Notexcali</h1>
                    </div>
                    
                    <div id="editor">
                        <!-- Editor blocks will be here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- App Entry -->
    <script type="module" src="main.js"></script>
    <script>
        // Initialize Lucide icons immediately for the shell
        lucide.createIcons();
    </script>
</body>
</html>
